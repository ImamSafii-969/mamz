<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Keranjang</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
padding-top:70px;
padding-bottom:90px;
}

/* NAVBAR */
.navbar{
height:60px;
background:white;
border-bottom:1px solid #ddd;
}

.title{
font-size:22px;
font-weight:500;
}

/* CARD PRODUK */
.cart-card{
background:white;
padding:15px;
margin-bottom:10px;
display:flex;
align-items:center;
gap:10px;
}

.cart-img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
}

.product-info{
flex:1;
}

.product-name{
font-size:15px;
font-weight:500;
}

.price{
color:red;
font-weight:bold;
margin-top:5px;
}

/* BAWAH */
.bottom-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
border-top:1px solid #ddd;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.checkout-btn{
background:#198754;
border:none;
color:white;
padding:12px 20px;
border-radius:10px;
font-size:18px;
}
  
.pilihProduk,
#pilihSemua{
accent-color: #198754;
}

.total{
font-size:20px;
font-weight:bold;
color:red;
}
  
.qty-box{
display:flex;
align-items:center;
gap:12px;
margin-top:8px;
font-size:18px;
}

.qty-btn{
border:none;
background:none;
padding:0;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:#000;
line-height:1;
}

.qty-btn:hover{
opacity:0.7;
}

.qty-btn:hover{
opacity:0.9;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar fixed-top shadow-sm">
<div class="container d-flex justify-content-between align-items-center">

<button onclick="kembali()"
class="btn border-0 fs-4">
←
</button>

<div class="d-flex align-items-center gap-3">

<span
id="editBtn"
onclick="toggleEditMode()"
style="cursor:pointer;">
Ubah
</span>
  
<a href="chat.html"
class="text-dark text-decoration-none fs-4">
💬
</a>

</div>
</nav>


<!-- LIST PRODUK -->
<div class="container mt-3"
id="cart-list">

</div>


<!-- BOTTOM -->
<div class="bottom-bar">

<div>
<input type="checkbox"
id="pilihSemua"
onclick="toggleSemua()">

<label for="pilihSemua">
Semua
</label>
</div>

<div class="total"
id="total">
Rp0
</div>

<button
class="checkout-btn"
id="checkoutBtn"
onclick="aksiTombol()">
Checkout (0)
</button>

</div>



<script>
  
let editMode = false;

function kembali(){
if(window.history.length > 1){
history.back();
}else{
window.location.href =
"index.html";
}
}
  
function toggleEditMode(){

editMode = !editMode;

let editBtn =
document.getElementById("editBtn");

let checkoutBtn =
document.getElementById("checkoutBtn");

let total =
document.getElementById("total");

if(editMode){

editBtn.innerText = "Selesai";

checkoutBtn.innerText = "Hapus";

total.style.display = "none";

}else{

editBtn.innerText = "Ubah";

total.style.display = "block";

hitungTotal();

}

}


// AMBIL KERANJANG
let keranjang =
JSON.parse(
localStorage.getItem(
"keranjang"
)) || [];

let cartList =
document.getElementById(
"cart-list"
);


// TAMPILKAN PRODUK
keranjang.forEach((item,index)=>{

cartList.innerHTML += `

<div class="cart-card">

<input type="checkbox"
class="pilihProduk"
data-index="${index}"
onchange="hitungTotal()">

<img src="${item.gambar}"
class="cart-img">

<div class="product-info">

<div class="product-name">
${item.nama}
</div>

<div class="price harga">
Rp${item.harga.toLocaleString()}
</div>

<div class="qty-box">

<button
class="qty-btn"
onclick="kurangJumlah(${index})">
-
</button>

<span id="jumlah-${index}">
${item.jumlah}
</span>

<button
class="qty-btn"
onclick="tambahJumlah(${index})">
+
</button>

</div>

</div>

</div>

`;

});



// PILIH SEMUA
function toggleSemua(){

let semua =
document.getElementById(
"pilihSemua"
).checked;

document
.querySelectorAll(
".pilihProduk"
)
.forEach(cb=>{

cb.checked =
semua;

});

hitungTotal();
}



// HITUNG TOTAL
function hitungTotal(){

let total = 0;
let jumlahDipilih = 0;

document
.querySelectorAll(
".pilihProduk"
)
.forEach((cb,index)=>{

if(cb.checked){

total +=
keranjang[index].harga *
keranjang[index].jumlah;

jumlahDipilih++;

}

});

document
.getElementById("total")
.innerText =
"Rp" +
total.toLocaleString();

if(!editMode){

document
.getElementById(
"checkoutBtn"
)
.innerText =
"Checkout (" +
jumlahDipilih +
")";

}
}
  
  // TAMBAH JUMLAH
function tambahJumlah(index){

keranjang[index].jumlah++;

localStorage.setItem(
"keranjang",
JSON.stringify(keranjang)
);

document.getElementById(
`jumlah-${index}`
).innerText =
keranjang[index].jumlah;

hitungTotal();

}


// KURANG JUMLAH
function kurangJumlah(index){

if(keranjang[index].jumlah > 1){

keranjang[index].jumlah--;

localStorage.setItem(
"keranjang",
JSON.stringify(keranjang)
);

document.getElementById(
`jumlah-${index}`
).innerText =
keranjang[index].jumlah;

hitungTotal();

}

}
  
function aksiTombol(){

if(editMode){

let checkboxes =
document.querySelectorAll(
".pilihProduk"
);

keranjang =
keranjang.filter(
(item,index)=>
!checkboxes[index].checked
);

localStorage.setItem(
"keranjang",
JSON.stringify(keranjang)
);

location.reload();

}else{

alert("Menu checkout belum dibuat");

}

}

</script>

</body>
</html>
