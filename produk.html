<!DOCTYPE html>
<html>
<head>
<title>Detail Produk</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
padding-top:70px;
padding-bottom:80px;
}

.navbar{
height:60px;
z-index:1000;
}

.produk-img{
height:300px;
object-fit:cover;
}

/* MENU BAWAH */
.bottom-menu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:center;
align-items:center;
height:70px;
box-shadow:0 -2px 8px rgba(0,0,0,0.08);
}

.menu-item{
flex:1;
text-align:center;
text-decoration:none;
color:black;
font-size:22px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
}

.menu-item small{
font-size:12px;
margin-top:2px;
}

.divider{
width:1px;
height:40px;
background:#ccc;
}

</style>

</head>
<body>
    <!-- NAVBAR ATAS -->
<nav class="navbar bg-white shadow-sm fixed-top">
  <div class="container d-flex justify-content-between align-items-center">

    <!-- Tombol Kembali -->
 <button onclick="kembali()"
class="btn border-0 fs-4">
←
</button>

    <!-- Logo Keranjang -->
    <a href="keranjang.html"
    class="text-dark text-decoration-none fs-4">
      🛒
    </a>

  </div>
</nav>

<div class="container mt-3">

    <img id="gambar"
    class="w-100 rounded produk-img">

    <h4 id="nama"
    class="mt-3"></h4>

    <h3 class="text-danger"
    id="harga"></h3>

    <p id="rating"></p>
    <p id="kota"></p>

</div>

<!-- MENU BAWAH -->
<div class="bottom-menu">

    <a href="chat.html" class="menu-item">
        <div>💬</div>
    </a>

    <div class="divider"></div>

    <!-- KERANJANG -->
    <div class="menu-item"
    onclick="tambahKeranjang()"
    style="cursor:pointer;">
        <div>🛒</div>
    </div>

</div>

<script>

// Ambil data produk
let produk =
JSON.parse(
localStorage.getItem(
"produkDipilih"
));

document.getElementById("gambar")
.src = produk.gambar;

document.getElementById("nama")
.innerText = produk.nama;

document.getElementById("harga")
.innerText =
"Rp" +
produk.harga.toLocaleString();

document.getElementById("rating")
.innerText =
"Rating: " + produk.rating;

document.getElementById("kota")
.innerText =
"Toko: " + produk.kota;


// Tambah ke keranjang
function tambahKeranjang(){

let keranjang =
JSON.parse(
localStorage.getItem(
"keranjang"
)) || [];

let index =
keranjang.findIndex(item =>
item.nama === produk.nama
);

if(index !== -1){

keranjang[index].jumlah += 1;

}else{

keranjang.push({
nama: produk.nama,
harga: produk.harga,
gambar: produk.gambar,
jumlah: 1
});

}

localStorage.setItem(
"keranjang",
JSON.stringify(keranjang)
);

alert("Barang masuk ke keranjang!");

}
function kembali(){

    // jika ada halaman sebelumnya
    if(window.history.length > 1){
        window.history.back();
    } 
    
    // jika tidak ada riwayat
    else{
        window.location.href = "index.html";
    }

}
</script>

</body>
</html>
