<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Masuk</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#fff;
padding-bottom:80px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.back-btn{
font-size:40px;
text-decoration:none;
color:black;
border:none;
background:none;
}

.help{
font-size:28px;
text-decoration:none;
color:black;
}

.container-login{
padding:20px;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.input-box{
border:2px solid #d9d9d9;
border-radius:12px;
padding:12px;
display:flex;
align-items:center;
margin-bottom:15px;
}

.input-box input{
border:none;
outline:none;
font-size:16px;
width:100%;
margin-left:10px;
}

.btn-lanjut{
width:100%;
border:none;
background:#198754;
color:white;
padding:12px;
border-radius:12px;
font-size:18px;
font-weight:600;
}
  
 .or{
display:flex;
align-items:center;
justify-content:center;
margin-top:35px;
margin-bottom:35px;
color:gray;
font-size:15px;
text-align:center;
}

.or::before,
.or::after{
content:"";
flex:1;
height:1px;
background:#ddd;
}

.or span{
padding:0 15px;
white-space:nowrap;
}

.login-option{
border:1px solid #ddd;
border-radius:15px;
padding:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:600;
margin-bottom:12px;
text-decoration:none;
color:black;
}

.footer-login{
position:fixed;
bottom:0;
width:100%;
background:#f5f5f5;
text-align:center;
padding:14px;
font-size:16px;
}

.back-btn{
font-size:28px;
}

.help{
font-size:22px;
}
  
</style>
</head>

<body>

<div class="header">

<div class="container pt-3">

<button onclick="kembali()"
class="btn border-0 fs-4 p-0">
←
</button>

</div>

</div>


<div class="container-login">

<div class="title">
Masuk ke iXsStore
</div>

<div class="input-box">
📱
<input type="text"
placeholder="Contoh: 08123456789">
</div>

<button class="btn-lanjut">
Lanjut
</button>


<div class="or">
<span>atau masuk dengan</span>
</div>


<a href="#"
class="login-option">
Google
</a>

<a href="#"
class="login-option">
E-mail
</a>

<a href="#"
class="login-option">
TikTok Shop
</a>

<p class="text-center mt-4 text-muted">
Dengan masuk di sini, kamu menyetujui
<span class="text-success fw-bold">
Syarat & Ketentuan
</span>
serta
<span class="text-success fw-bold">
Kebijakan Privasi
</span>
Tokopedia
</p>

</div>


<div class="footer-login">
Belum punya akun?
<a href="daftar.html">
Daftar Sekarang
</a>
</div>
<script>
function kembali(){

if(window.history.length > 1){
    history.back();
}else{
    window.location.href =
    "akun.html";
}

}
</script>
</body>
</html>
